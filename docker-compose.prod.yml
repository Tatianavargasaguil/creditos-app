version: '3.8'

services:
  creditos_db:
    image: postgres:16-alpine
    container_name: creditos_db
    environment:
      POSTGRES_USER: creditos_user
      POSTGRES_PASSWORD: Creditos2026Secure!
      POSTGRES_DB: creditos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditos_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  creditos_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creditos_backend
    environment:
      DATABASE_URL: postgresql://creditos_user:Creditos2026Secure!@creditos_db:5432/creditos
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      ENVIRONMENT: production
    ports:
      - "8010:8000"
    depends_on:
      creditos_db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  creditos_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creditos_frontend
    ports:
      - "4210:4210"
    environment:
      NGINX_PORT: 4210
    depends_on:
      - creditos_backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:4210"]
      interval: 30s
      timeout: 10s
      retries: 3

  creditos_nginx:
    image: nginx:alpine
    container_name: creditos_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - creditos_frontend
      - creditos_backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: creditos-network
